name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create --org com.test --project-name youtube_app temp_project

      - name: Copy our main.dart
        run: cp lib/main.dart temp_project/lib/main.dart

      - name: Copy pubspec.yaml
        run: cp pubspec.yaml temp_project/pubspec.yaml

      - name: Build APK
        working-directory: temp_project
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: youtube-apk
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
