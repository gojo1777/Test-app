name: Build SayuraTube APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create --org com.sayura --project-name sayuratube temp_project

      - name: Copy main.dart
        run: cp lib/main.dart temp_project/lib/main.dart

      - name: Copy pubspec.yaml
        run: cp pubspec.yaml temp_project/pubspec.yaml

      - name: Fix AndroidManifest
        run: |
          cat > temp_project/android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:label="SayuraTube"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          EOF

      - name: Set App Icon
        run: |
          sudo apt-get install -y imagemagick
          convert logo.png -resize 48x48 temp_project/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert logo.png -resize 72x72 temp_project/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert logo.png -resize 96x96 temp_project/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert logo.png -resize 144x144 temp_project/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert logo.png -resize 192x192 temp_project/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build APK
        working-directory: temp_project
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: SayuraTube
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
